# create environment variables

# Windows
# $env:DB_NAME="northwind"
# $env:DB_USERNAME="root"
# $env:DB_PASSWORD="password"

# Mac
# export DB_NAME="northwind"
# export DB_USERNAME="root"
# export DB_PASSWORD="password"

## datasource connection properties
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME:northwind}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:yearup26}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

## jpa / hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

jwt.
jwt.token-timeout-seconds=108000

server.port=8080
debug=true

## swagger / springdoc
springdoc.swagger-ui.url=/openapi.yaml
springdoc.swagger-ui.path=/swagger-ui.html

## startup output
spring.main.log-startup-info=false
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.zaxxer.hikari=WARN
logging.level.org.yearup=INFO
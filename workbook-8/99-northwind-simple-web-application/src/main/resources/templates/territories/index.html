<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Employee Territories</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="css/styles.css">

</head>
<body>
<div th:replace="fragments/header.html :: nav"></div>
<main class="container mt-4">
    <h4>Territories</h4>

    <a th:href="@{/territories/new}">New</a>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Territory Id</th>
            <th>Territory Name</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="territory:${territories}">
            <td th:text="${territory.territoryId}"></td>
            <td>
                <a  th:href="@{|/territories/${territory.territoryId}|}" th:text="${territory.territoryDescription}"></a>
            </td>
            <td>
                <a  th:href="@{|/employees?tid=${territory.territoryId}|}" class="btn btn-primary">View Employees</a>
                <a  th:href="@{|/territories/${territory.territoryId}/edit|}" class="btn btn-success">Edit</a>
                <a  th:href="@{|/territories/${territory.territoryId}/delete|}" class="btn btn-danger">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>

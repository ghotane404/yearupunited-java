<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>All Employees</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="css/styles.css">

</head>
<body>
<div th:replace="fragments/header.html :: nav"></div>
<main class="container mt-4">
    <h4>Employees in <span th:text="${territory.territoryId}"></span></h4>

    <a th:href="@{|/employees/new?eid=${territory.territoryId}|}">New</a>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Employee Id</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Salary</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="employee:${employees}">
            <td th:text="${employee.employeeId}"></td>
            <td>
                <a  th:href="@{|/employees/${employee.employeeId}|}" th:text="${employee.firstName}"></a>
            </td>
            <td th:text="${employee.territoryId}"></td>
            <!--        <td>$ <span th:text="${employee.unitPrice}"></span></td>-->
            <td th:text="${#numbers.formatCurrency(employee.salary)}"></td>
            <td>
                <a  th:href="@{|/employees/${employee.employeeId}/edit|}" class="btn btn-success">Edit</a>
                <a  th:href="@{|/employees/${employee.employeeId}/delete|}" class="btn btn-danger">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>

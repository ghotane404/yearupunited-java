<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Employee Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div th:replace="fragments/header.html :: nav"></div>
<main class="container mt-4">
    <h4>Employee Details</h4>

    <table class="table">
        <tr>
            <td>Employee ID</td>
            <td th:text="${employee.employeeId}"></td>
        </tr>
        <tr>
            <td>Territory ID</td>
            <td th:text="${territory.territoryId}"></td>
        </tr>
        <tr>
            <td>First Name</td>
            <td th:text="${employee.firstName}"></td>
        </tr>
        <tr>
            <td>Last Name</td>
            <td th:text="${employee.lastName}"></td>
        </tr>
        <tr>
            <td>Title</td>
            <td th:text="${employee.title}"></td>
        </tr>
        <tr>
            <td>Hire Date</td>
            <td th:text="${employee.hireDate}"></td>
        </tr>
        <tr>
            <td>Notes</td>
            <td th:text="${employee.notes}"></td>
        </tr>
        <tr>
            <td>Salary</td>
            <td th:text="${#numbers.formatCurrency(employee.salary)}"></td>
        </tr>
    </table>

</main>
</body>
</html>
